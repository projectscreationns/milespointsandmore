<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · {{ site_title }}</title>
  <meta name="description" content="{{ description }}">
  <link rel="canonical" href="{{ canonical }}">
  <meta property="og:site_name" content="{{ site_title }}">
  <meta property="og:title" content="{{ page_title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ canonical }}">
  <meta name="twitter:card" content="summary">
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="/rss.xml">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap site-header__inner">
      <a class="brand" href="/">
        <span class="brand__mark">{{ logo_svg }}</span>
        <span class="brand__text">{{ site_title }}</span>
      </a>
      <nav class="nav">
        {{ nav }}
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="site-footer__meta">
        <p class="brand__text">{{ site_title }}</p>
        <p class="socials">{{ socials }}</p>
        <p class="disclaimer">{{ disclaimer }}</p>
        <p class="copyright">© {{ year }} {{ site_title }}. {{ footer_note }}</p>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var root = document.documentElement;
      var saved = localStorage.getItem("theme");
      if (saved) root.setAttribute("data-theme", saved);
      var btn = document.querySelector(".theme-toggle");
      if (btn) btn.addEventListener("click", function () {
        var cur = root.getAttribute("data-theme");
        var next = cur === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      });

      // Category filter (Articles page)
      var catbar = document.querySelector(".catbar");
      if (catbar) {
        var grid = document.getElementById("post-grid");
        var empty = document.getElementById("cat-empty");
        catbar.addEventListener("click", function (e) {
          var b = e.target.closest(".catbar__item");
          if (!b) return;
          var f = b.getAttribute("data-filter");
          catbar.querySelectorAll(".catbar__item").forEach(function (x) {
            x.classList.toggle("active", x === b);
          });
          var shown = 0;
          grid.querySelectorAll(".card").forEach(function (c) {
            var show = f === "All Posts" || c.getAttribute("data-category") === f;
            c.style.display = show ? "" : "none";
            if (show) shown++;
          });
          if (empty) empty.hidden = shown > 0;
        });
      }
    })();
  </script>
</body>
</html>
