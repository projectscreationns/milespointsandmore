<article class="post">
  <header class="post__head">
    <div class="post__meta">{{ date_human }} · {{ author }} <span class="post__readtime">{{ read_time }}</span></div>
    <h1 class="post__title">{{ post_title }}</h1>
    <div class="post__tags">{{ tags }}</div>
    <div class="post__updated">{{ updated }}</div>
  </header>

  {{ hero }}

  <div class="post__body">
    {{ body }}
  </div>

  <footer class="post__foot">
    <p class="post__disclaimer">{{ disclaimer }}</p>
    <a class="back-link" href="/articles/">← All articles</a>
  </footer>
</article>
