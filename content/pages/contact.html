<form class="cform" action="mailto:hello@milespointsandmore.com" method="post" enctype="text/plain">
  <div class="cform__row">
    <label class="cform__field">First Name
      <input type="text" name="First Name" required>
    </label>
    <label class="cform__field">Last Name
      <input type="text" name="Last Name">
    </label>
  </div>
  <label class="cform__field">Email
    <input type="email" name="Email" required>
  </label>
  <label class="cform__field">Message
    <textarea name="Message" rows="6"></textarea>
  </label>
  <button class="cform__send" type="submit">Send</button>
</form>
